<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forensic Agent Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #06090e;
      --bg-deep: #0a0f1a;
      --panel-bg: rgba(16, 23, 40, 0.7);
      --panel-bg-solid: rgba(16, 23, 40, 0.92);
      --panel-border: rgba(43, 76, 126, 0.4);
      --primary-cyan: #00e5ff;
      --primary-glow: rgba(0, 229, 255, 0.2);
      --primary-blue: #2979ff;
      --success-green: #00e676;
      --success-glow: rgba(0, 230, 118, 0.2);
      --warning-amber: #ffb300;
      --error-red: #ff3d00;
      --purple: #b388ff;
      --text-main: #f0f4f8;
      --text-muted: #8a9bb2;
      --text-dim: #556680;
      --font-ui: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-dark); color: var(--text-main); font-family: var(--font-ui);
      line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; overflow-x: hidden;
    }
    #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    #app-root { position: relative; z-index: 1; max-width: 1500px; margin: 0 auto; padding: 24px 32px 60px; }

    /* ── Waiting Spinner ── */
    #waiting { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; text-align: center; color: var(--primary-cyan); }
    #waiting p { font-size: 18px; font-weight: 300; letter-spacing: 2px; margin-top: 24px; animation: pulse-opacity 2s infinite; }
    .cyber-spinner { width: 60px; height: 60px; border: 3px solid transparent; border-top-color: var(--primary-cyan); border-bottom-color: var(--success-green); border-radius: 50%; animation: spin 1.5s cubic-bezier(0.68,-0.55,0.265,1.55) infinite; position: relative; }
    .cyber-spinner::before { content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; border: 2px solid transparent; border-left-color: var(--warning-amber); border-radius: 50%; animation: spin 1s linear infinite reverse; }

    /* ── Header ── */
    .header { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; background: linear-gradient(135deg, rgba(16,23,40,0.95) 0%, rgba(10,14,24,0.8) 100%); padding: 20px 28px; border-radius: 16px; border: 1px solid var(--panel-border); border-left: 4px solid var(--primary-cyan); margin-bottom: 0; box-shadow: 0 4px 40px rgba(0,0,0,0.4); }
    .header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #fff 0%, var(--primary-cyan) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .meta { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
    .badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; }
    .badge-starting { background: rgba(138,155,178,0.1); color: var(--text-muted); border: 1px solid rgba(138,155,178,0.3); }
    .badge-preprocessing { background: rgba(0,229,255,0.1); color: var(--primary-cyan); border: 1px solid var(--primary-cyan); box-shadow: 0 0 10px var(--primary-glow); }
    .badge-loading_database { background: rgba(179,136,255,0.1); color: var(--purple); border: 1px solid var(--purple); animation: pulse-border 2s infinite; }
    .badge-multi_agent { background: rgba(0,230,118,0.1); color: var(--success-green); border: 1px solid var(--success-green); box-shadow: 0 0 10px var(--success-glow); animation: pulse-green 2s infinite; }
    .badge-analyzing { background: rgba(0,230,118,0.1); color: var(--success-green); border: 1px solid var(--success-green); animation: pulse-green 2s infinite; }
    .badge-synthesizing { background: rgba(255,179,0,0.1); color: var(--warning-amber); border: 1px solid var(--warning-amber); animation: pulse-border 2s infinite; }
    .badge-reporting { background: rgba(255,179,0,0.1); color: var(--warning-amber); border: 1px solid var(--warning-amber); }
    .badge-complete { background: rgba(0,230,118,0.1); color: var(--success-green); border: 1px solid var(--success-green); }
    .badge-waiting { background: rgba(138,155,178,0.1); color: var(--text-muted); border: 1px solid rgba(138,155,178,0.3); }
    .badge-HIGH { background: rgba(255,61,0,0.15); color: var(--error-red); border: 1px solid var(--error-red); }
    .badge-MEDIUM { background: rgba(255,179,0,0.15); color: var(--warning-amber); border: 1px solid var(--warning-amber); }
    .badge-LOW { background: rgba(0,230,118,0.15); color: var(--success-green); border: 1px solid var(--success-green); }

    /* ── KPI Row ── */
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin: 20px 0; }
    .kpi-card { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 12px; padding: 16px 20px; text-align: center; transition: all 0.3s; }
    .kpi-card:hover { border-color: rgba(0,229,255,0.4); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .kpi-value { font-size: 28px; font-weight: 800; font-family: var(--font-mono); background: linear-gradient(135deg, var(--primary-cyan), var(--success-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-top: 4px; font-weight: 600; }

    /* ── Tab Navigation ── */
    .tab-nav { display: flex; gap: 4px; padding: 6px; background: rgba(10,15,26,0.8); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--panel-border); border-top: none; border-radius: 0 0 16px 16px; margin-bottom: 28px; position: sticky; top: 0; z-index: 100; }
    .tab-btn { flex: 1; padding: 12px 16px; background: transparent; border: 1px solid transparent; border-radius: 10px; color: var(--text-muted); font-family: var(--font-ui); font-size: 12px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px; position: relative; }
    .tab-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.06); }
    .tab-btn.active { color: var(--primary-cyan); background: rgba(0,229,255,0.06); border-color: rgba(0,229,255,0.25); box-shadow: 0 0 20px rgba(0,229,255,0.08); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%; height: 2px; background: var(--primary-cyan); box-shadow: 0 0 8px var(--primary-cyan); border-radius: 2px; }
    .tab-icon { font-size: 14px; }
    .tab-notif { font-size: 9px; background: var(--error-red); color: #fff; padding: 1px 6px; border-radius: 10px; font-weight: 700; min-width: 18px; text-align: center; }

    /* ── Tab Content ── */
    .tab-content { display: none; animation: fadeSlideIn 0.35s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Panels ── */
    .panel { background: var(--panel-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--panel-border); border-radius: 14px; padding: 24px; margin-bottom: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); transition: border-color 0.3s ease; }
    .panel:hover { border-color: rgba(0,229,255,0.3); }
    h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--primary-cyan); margin-bottom: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    h2::before { content: ''; display: inline-block; width: 8px; height: 8px; background: var(--primary-cyan); box-shadow: 0 0 8px var(--primary-glow); }

    /* ════════════════════════════════════════════
       8-PHASE PIPELINE TRACKER
       ════════════════════════════════════════════ */
    .phase-pipeline { display: flex; flex-direction: column; gap: 0; }
    .phase-row { display: grid; grid-template-columns: 50px 1fr; gap: 0; position: relative; }
    .phase-line-area { display: flex; flex-direction: column; align-items: center; position: relative; }
    .phase-dot {
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; font-family: var(--font-mono);
      border: 2px solid var(--panel-border); background: var(--bg-dark); color: var(--text-dim);
      z-index: 2; transition: all 0.4s ease; flex-shrink: 0;
    }
    .phase-dot.done { border-color: var(--success-green); color: var(--success-green); background: rgba(0,230,118,0.1); box-shadow: 0 0 12px rgba(0,230,118,0.3); }
    .phase-dot.active { border-color: var(--primary-cyan); color: var(--primary-cyan); background: rgba(0,229,255,0.1); box-shadow: 0 0 12px var(--primary-glow); animation: pulse-border 2s infinite; }
    .phase-dot.cached { border-color: var(--warning-amber); color: var(--warning-amber); background: rgba(255,179,0,0.1); }
    .phase-dot.error { border-color: var(--error-red); color: var(--error-red); background: rgba(255,61,0,0.1); }
    .phase-connector { width: 2px; flex-grow: 1; background: rgba(255,255,255,0.06); min-height: 8px; }
    .phase-connector.done { background: var(--success-green); box-shadow: 0 0 6px rgba(0,230,118,0.3); }
    .phase-connector.active { background: linear-gradient(180deg, var(--primary-cyan), rgba(0,229,255,0.1)); animation: pulse-opacity 1.5s infinite; }

    .phase-card {
      background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.04); border-radius: 12px;
      padding: 16px 20px; margin: 4px 0 4px 0; transition: all 0.3s ease; min-height: 60px;
    }
    .phase-card.active { background: rgba(0,229,255,0.03); border-color: rgba(0,229,255,0.15); }
    .phase-card.done { border-color: rgba(0,230,118,0.15); }

    .phase-title-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .phase-name { font-size: 13px; font-weight: 700; color: var(--text-main); }
    .phase-name.dim { color: var(--text-dim); }
    .phase-desc { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); margin-bottom: 8px; }
    .phase-status-text { font-size: 11px; color: var(--primary-cyan); font-family: var(--font-mono); font-weight: 500; }
    .phase-status-text.done { color: var(--success-green); }
    .phase-status-text.error { color: var(--error-red); }
    .phase-badge-cached { font-size: 9px; background: rgba(255,179,0,0.12); color: var(--warning-amber); border: 1px solid rgba(255,179,0,0.3); padding: 2px 8px; border-radius: 4px; font-weight: 700; letter-spacing: 0.5px; }

    /* Phase detail: data chips */
    .phase-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip { font-size: 10px; padding: 3px 10px; border-radius: 6px; font-family: var(--font-mono); border: 1px solid var(--panel-border); background: rgba(0,0,0,0.4); color: var(--text-muted); transition: all 0.3s; }
    .chip.ok { border-color: rgba(0,230,118,0.4); color: var(--success-green); background: rgba(0,230,118,0.05); }
    .chip.error { border-color: rgba(255,61,0,0.4); color: var(--error-red); background: rgba(255,61,0,0.05); }
    .chip.active { border-color: rgba(0,229,255,0.4); color: var(--primary-cyan); background: rgba(0,229,255,0.05); animation: pulse-opacity 2s infinite; }

    /* Phase 5 DB loading bar */
    .db-bar-wrap { background: rgba(0,0,0,0.5); border-radius: 6px; height: 8px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.04); overflow: hidden; }
    .db-bar-fill { height: 100%; width: 0%; border-radius: 6px; background: linear-gradient(90deg, var(--purple), var(--primary-cyan)); transition: width 0.6s ease; position: relative; }
    .db-bar-fill.shimmer::after { content: ''; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: shimmer 1.5s infinite; }

    /* Phase 6 worker agents */
    .worker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
    @media (max-width: 900px) { .worker-grid { grid-template-columns: 1fr; } }
    .worker-card {
      background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px;
      padding: 14px 16px; transition: all 0.3s; position: relative; overflow: hidden;
    }
    .worker-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--text-dim); transition: all 0.3s; }
    .worker-card.running::before { background: var(--primary-cyan); box-shadow: 0 0 8px var(--primary-glow); }
    .worker-card.done::before { background: var(--success-green); }
    .worker-card.error::before { background: var(--error-red); }
    .worker-card.running { border-color: rgba(0,229,255,0.2); background: rgba(0,229,255,0.02); }
    .worker-card.done { border-color: rgba(0,230,118,0.15); }

    .worker-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .worker-letter { font-size: 22px; font-weight: 800; font-family: var(--font-mono); color: var(--text-dim); }
    .worker-card.running .worker-letter { color: var(--primary-cyan); }
    .worker-card.done .worker-letter { color: var(--success-green); }
    .worker-title { font-size: 12px; font-weight: 600; color: var(--text-main); }
    .worker-subtitle { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }

    .worker-progress { margin-top: 8px; }
    .worker-iter { font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); margin-bottom: 4px; }
    .worker-iter-bar { background: rgba(0,0,0,0.5); height: 4px; border-radius: 2px; overflow: hidden; }
    .worker-iter-fill { height: 100%; background: var(--primary-cyan); border-radius: 2px; transition: width 0.3s; }
    .worker-card.done .worker-iter-fill { background: var(--success-green); }

    .worker-last-query { font-size: 10px; font-family: var(--font-mono); color: var(--text-dim); margin-top: 6px; padding: 6px 8px; background: rgba(0,0,0,0.3); border-radius: 4px; max-height: 40px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .worker-finding-preview { font-size: 11px; color: #b0c0d0; margin-top: 8px; line-height: 1.5; }
    .worker-confidence { display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-top: 6px; }

    /* ════════════════════════════════════════════
       ELAPSED TIMER
       ════════════════════════════════════════════ */
    .elapsed { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); }
    .elapsed .num { color: var(--primary-cyan); font-weight: 600; }

    /* ════════════════════════════════════════════
       FINDINGS GRID (Live Monitor)
       ════════════════════════════════════════════ */
    .findings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .finding-card { background: linear-gradient(145deg, rgba(16,23,40,0.9), rgba(10,14,24,0.9)); border: 1px solid var(--panel-border); border-radius: 12px; padding: 20px; transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275), box-shadow 0.3s ease; position: relative; overflow: hidden; }
    .finding-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--panel-border); transition: background 0.3s; }
    .finding-card.done::before { background: var(--primary-cyan); box-shadow: 0 0 10px var(--primary-glow); }
    .finding-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.1); }
    .finding-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .finding-qid { font-size: 24px; font-weight: 800; color: var(--text-main); opacity: 0.9; }
    .finding-title { font-size: 14px; font-weight: 600; color: var(--primary-cyan); margin-bottom: 8px; }
    .finding-summary { font-size: 13px; color: #b0c0d0; line-height: 1.6; margin-bottom: 12px; }
    .finding-evidence { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: 6px; display: inline-block; }
    .finding-model { font-size: 11px; color: var(--primary-cyan); font-family: var(--font-mono); background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.2); padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
    .finding-model.error { color: #ff6b6b; background: rgba(255,107,107,0.08); border-color: rgba(255,107,107,0.2); }
    .finding-pending { font-size: 13px; color: var(--text-muted); font-style: italic; opacity: 0.7; }

    /* ════════════════════════════════════════════
       LLM ACTIVITY LOG
       ════════════════════════════════════════════ */
    .llm-log-wrap { max-height: 500px; overflow-y: auto; font-family: var(--font-mono); font-size: 11px; line-height: 1.8; }

    /* ════════════════════════════════════════════
       TAB 2: FINDINGS DETAIL
       ════════════════════════════════════════════ */
    .finding-full-card { background: var(--panel-bg-solid); border: 1px solid var(--panel-border); border-radius: 14px; margin-bottom: 20px; overflow: hidden; transition: border-color 0.3s; }
    .finding-full-card:hover { border-color: rgba(0,229,255,0.35); }
    .finding-full-header { display: flex; align-items: center; gap: 16px; padding: 20px 24px; cursor: pointer; user-select: none; transition: background 0.2s; }
    .finding-full-header:hover { background: rgba(255,255,255,0.02); }
    .fq-letter { font-size: 32px; font-weight: 800; font-family: var(--font-mono); color: var(--primary-cyan); min-width: 50px; text-align: center; text-shadow: 0 0 20px var(--primary-glow); }
    .fq-info { flex: 1; }
    .fq-title { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
    .fq-question { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .fq-chevron { font-size: 18px; color: var(--text-dim); transition: transform 0.3s; }
    .finding-full-card.open .fq-chevron { transform: rotate(180deg); }
    .fq-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    .finding-full-card.open .fq-body { max-height: 3000px; }
    .fq-body-inner { padding: 0 24px 24px; }
    .fq-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--primary-cyan); margin: 20px 0 10px; font-weight: 600; }
    .fq-summary-text { font-size: 14px; color: #c0d0e0; line-height: 1.7; }
    .fq-mitre-chip { display: inline-block; padding: 4px 12px; border-radius: 6px; background: rgba(41,121,255,0.1); border: 1px solid rgba(41,121,255,0.3); color: var(--primary-blue); font-size: 11px; font-weight: 600; font-family: var(--font-mono); margin-right: 6px; margin-bottom: 6px; }
    .evidence-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
    .evidence-table th { text-align: left; padding: 10px 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.06); font-weight: 600; }
    .evidence-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #b0c0d0; font-family: var(--font-mono); font-size: 11px; vertical-align: top; max-width: 400px; word-break: break-word; }
    .evidence-table tr:hover td { background: rgba(0,229,255,0.02); }
    .fq-limitations, .fq-next-steps { list-style: none; margin-top: 6px; }
    .fq-limitations li, .fq-next-steps li { font-size: 13px; color: var(--text-muted); padding: 4px 0 4px 16px; position: relative; }
    .fq-limitations li::before { content: '!'; position: absolute; left: 0; color: var(--warning-amber); font-weight: 700; font-size: 11px; }
    .fq-next-steps li::before { content: '>'; position: absolute; left: 0; color: var(--primary-cyan); font-family: var(--font-mono); font-weight: 700; }
    .findings-empty { text-align: center; padding: 80px 20px; color: var(--text-dim); font-size: 14px; }

    /* ════════════════════════════════════════════
       TAB 3: REPORTS
       ════════════════════════════════════════════ */
    .report-tab-bar { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
    .report-tab-btn { padding: 10px 20px; border-radius: 10px; font-size: 12px; font-weight: 600; background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); color: var(--text-muted); cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
    .report-tab-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text-main); }
    .report-tab-btn.active { border-color: var(--primary-cyan); color: var(--primary-cyan); background: rgba(0,229,255,0.06); box-shadow: 0 0 12px rgba(0,229,255,0.1); }
    .report-tab-btn .dot { width: 8px; height: 8px; border-radius: 50%; }
    .report-tab-btn .dot.available { background: var(--success-green); box-shadow: 0 0 6px var(--success-glow); }
    .report-tab-btn .dot.unavailable { background: var(--text-dim); }

    .report-container h1 { font-size: 28px; font-weight: 800; color: var(--text-main); margin: 32px 0 16px; border-bottom: 2px solid rgba(0,229,255,0.2); padding-bottom: 12px; }

    .report-container pre { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 16px 20px; overflow-x: auto; margin-bottom: 16px; }

    .report-container table td { padding: 10px 12px; font-size: 13px; color: #b0c0d0; border-bottom: 1px solid rgba(255,255,255,0.03); }

    /* ════════════════════════════════════════════
       TAB 4: TIMELINE
       ════════════════════════════════════════════ */
    .timeline-vertical { position: relative; padding: 0 0 0 40px; }
    .timeline-vertical::before { content: ''; position: absolute; left: 19px; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg, var(--primary-cyan), var(--panel-border), transparent); }
    .tl-event { position: relative; margin-bottom: 4px; padding: 16px 20px; background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 10px; transition: all 0.3s ease; }
    .tl-event:hover { border-color: rgba(0,229,255,0.3); box-shadow: 0 4px 20px rgba(0,0,0,0.3); transform: translateX(4px); }
    .tl-event::before { content: ''; position: absolute; left: -29px; top: 20px; width: 14px; height: 14px; border-radius: 50%; background: var(--bg-dark); border: 2px solid var(--text-dim); transition: all 0.3s; box-shadow: 0 0 0 4px var(--bg-dark); }
    .tl-event:hover::before { border-color: var(--primary-cyan); box-shadow: 0 0 0 4px var(--bg-dark), 0 0 10px var(--primary-glow); }

    /* ════════════════════════════════════════════
       TAB 5: AGENT LOG
       ════════════════════════════════════════════ */
    .log-entry { display: flex; gap: 14px; padding: 14px 18px; background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 10px; margin-bottom: 6px; transition: all 0.2s ease; align-items: flex-start; }

    .log-empty { text-align: center; padding: 80px 20px; color: var(--text-dim); font-size: 14px; }

    /* ════════════════════════════════════════════
       TAB 6: DB EXPLORER
       ════════════════════════════════════════════ */
    .db-stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

    .db-stat-card:hover { border-color: rgba(0,229,255,0.3); transform: translateY(-2px); }

    .db-stat-bar { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.05); margin-top: 8px; overflow: hidden; }
    .db-stat-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--primary-cyan), var(--primary-blue)); transition: width 0.6s; }

    /* Toast notification */
    .toast { position: fixed; bottom: 30px; right: 30px; padding: 14px 24px; border-radius: 12px; font-size: 13px; font-weight: 500; z-index: 1000; transform: translateY(100px); opacity: 0; transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275); pointer-events: none; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: rgba(0,230,118,0.15); border: 1px solid rgba(0,230,118,0.4); color: var(--success-green); backdrop-filter: blur(12px); }
    .toast.info { background: rgba(0,229,255,0.15); border: 1px solid rgba(0,229,255,0.4); color: var(--primary-cyan); backdrop-filter: blur(12px); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    /* Animations */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 var(--primary-glow); } 70% { box-shadow: 0 0 0 10px rgba(0,229,255,0); } 100% { box-shadow: 0 0 0 0 rgba(0,229,255,0); } }
    @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 var(--success-glow); } 70% { box-shadow: 0 0 0 8px rgba(0,230,118,0); } 100% { box-shadow: 0 0 0 0 rgba(0,230,118,0); } }

    @media (max-width: 768px) {

      .worker-grid { grid-template-columns: 1fr; }
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>
<div class="toast" id="toast"></div>

    <button class="tab-btn" data-tab="report"><span class="tab-icon">&#9998;</span><span class="tab-label">Reports</span><span class="tab-notif" id="reports-count" style="display:none">0</span></button>

    <div class="panel">
      <h2>Ingest Summary</h2>
      <div id="ingest-summary-container" style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted);"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const N = 50, DIST = 140;
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  for (let i = 0; i < N; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4, r: Math.random()*1.5+0.5, a: Math.random()*0.3+0.1 });
  function anim() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i]; p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fillStyle = `rgba(0,229,255,${p.a})`; ctx.fill();
      for (let j = i+1; j < particles.length; j++) { const q = particles[j]; const d = Math.hypot(p.x-q.x, p.y-q.y); if (d < DIST) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.strokeStyle = `rgba(0,229,255,${0.06*(1-d/DIST)})`; ctx.stroke(); } }
    }
    requestAnimationFrame(anim);
  }
  anim();
})();

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════
const tabBtns = document.querySelectorAll('.tab-btn');
const tabContents = document.querySelectorAll('.tab-content');
let activeTab = 'live';
tabBtns.forEach(btn => btn.addEventListener('click', () => {
  const tab = btn.dataset.tab; if (tab === activeTab) return; activeTab = tab;
  tabBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active');
  tabContents.forEach(c => c.classList.remove('active')); document.getElementById('tab-'+tab).classList.add('active');
  if (tab === 'findings') loadFindings(); if (tab === 'report') loadReports();
  if (tab === 'timeline') loadTimeline(); if (tab === 'agentlog') loadAgentLog();
  if (tab === 'dbexplorer') loadDBExplorer();
}));

// ═══════════════════════════════════════════════
// PHASE DEFINITIONS
// ═══════════════════════════════════════════════
const PHASES = [
  { id: 'phase1', num: 1, name: 'Alert Ingestion', desc: 'Streaming Suricata EVE alerts — extracting IOC IPs and community IDs' },
  { id: 'phase2', num: 2, name: 'Zeek Correlation', desc: 'Scanning 30 GB Zeek JSON — filtering to IOC-matched records (conn, dns, ssl, http, dce_rpc)' },
  { id: 'phase3', num: 3, name: 'PCAP Targeting', desc: 'Building capinfos time-range index — all 129 PCAPs selected for deep analysis' },
  { id: 'phase4', num: 4, name: 'Deep PCAP Analysis', desc: 'tshark extraction (8 threads): DNS · HTTP · TLS · SMB · RDP · DCE-RPC · NetBIOS · TCP conv · SMB-tree · DCSync' },
  { id: 'phase5', num: 5, name: 'Database Loading', desc: 'Ingesting all artifacts into SQLite forensic database (17 evidence tables)' },
  { id: 'phase6', num: 6, name: 'Agent Investigation', desc: 'Claude Opus 4.6 workers A/B/C/D investigate independently via SQL tool-calling (up to 30 iterations each)' },
  { id: 'phase7', num: 7, name: 'Timeline Assembly', desc: 'Building chronological attack timeline from all four worker findings' },
  { id: 'phase8', num: 8, name: 'Report Synthesis', desc: 'Claude Opus 4.6 synthesizes all findings into a comprehensive MITRE ATT&CK-mapped forensic report' },
];

const WORKER_INFO = {
  A: { title: 'Initial Access', mitre: 'T1133', color: '#ff3d00' },
  B: { title: 'Lateral Movement', mitre: 'T1046/T1021.002', color: '#ffb300' },
  C: { title: 'Exfiltration', mitre: 'T1567', color: '#b388ff' },
  D: { title: 'Payload Delivery', mitre: 'T1021.001/T1570', color: '#2979ff' },
};

// ═══════════════════════════════════════════════
// PHASE STATE
// ═══════════════════════════════════════════════
function getPhaseStates(d) {
  const stage = d.stage || 'waiting';
  const pp = d.pcap_progress || {};
  const phaseDone = pp.done || 0;
  const states = {};
  for (let i = 1; i <= 4; i++) {
    if (stage === 'preprocessing') {
      if (phaseDone > i) states[i] = 'done';
      else if (phaseDone === i) states[i] = pp.current && pp.current.includes('done') ? 'done' : 'active';
      else if (phaseDone === i - 1) states[i] = 'active';
      else states[i] = 'pending';
    } else if (stage === 'starting') {
      states[i] = i === 1 ? 'active' : 'pending';
    } else {
      states[i] = 'done';
    }
  }
  if (stage === 'loading_database') states[5] = 'active';
  else if (['multi_agent','analyzing','synthesizing','reporting','complete'].includes(stage)) states[5] = 'done';
  else states[5] = 'pending';
  if (stage === 'multi_agent' || stage === 'analyzing') states[6] = 'active';
  else if (['synthesizing','reporting','complete'].includes(stage)) states[6] = 'done';
  else states[6] = 'pending';
  if (stage === 'synthesizing') states[7] = 'done';
  else if (stage === 'reporting') states[7] = 'active';
  else if (stage === 'complete') states[7] = 'done';
  else states[7] = 'pending';
  if (stage === 'synthesizing') states[8] = 'active';
  else if (stage === 'complete') states[8] = 'done';
  else states[8] = 'pending';
  return states;
}

function getPhaseDetail(phaseNum, d) {
  const stage = d.stage || 'waiting';
  const pp = d.pcap_progress || {};
  switch (phaseNum) {
    case 1: {
      const segs = d.alert_results || [];
      if (!segs.length) return { status: '', chips: [] };
      const total = segs.reduce((s, c) => s + parseInt((c.segment.match(/[\d,]+/) || ['0'])[0].replace(/,/g,''), 10), 0);
      return { status: `${total.toLocaleString()} alerts loaded across ${segs.length} categories`, chips: segs };
    }
    case 2: {
      const segs = d.zeek_results || [];
      if (!segs.length) return { status: pp.current || '', chips: [] };
      const total = segs.reduce((s, c) => s + parseInt((c.segment.match(/[\d,]+/) || ['0'])[0].replace(/,/g,''), 10), 0);
      return { status: `${total.toLocaleString()} records matched across ${segs.length} protocols`, chips: segs };
    }
    case 3: {
      const segs = d.pcap_index_results || [];
      return { status: segs.map(s => s.segment).join(' | ') || '', chips: segs };
    }
    case 4: {
      const segs = d.tshark_results || [];
      const count = segs.length;
      const ec = d.extraction_counts || {};
      const ecChips = [];
      if (ec.dns) ecChips.push({segment: `DNS: ${ec.dns.toLocaleString()}`, status: 'ok'});
      if (ec.tls) ecChips.push({segment: `TLS: ${ec.tls.toLocaleString()}`, status: 'ok'});
      if (ec.http) ecChips.push({segment: `HTTP: ${ec.http.toLocaleString()}`, status: 'ok'});
      if (ec.smb) ecChips.push({segment: `SMB: ${ec.smb.toLocaleString()}`, status: 'ok'});
      if (ec.rdp) ecChips.push({segment: `RDP: ${ec.rdp.toLocaleString()}`, status: 'ok'});
      if (ec.tcp_conv) ecChips.push({segment: `TCP conv: ${ec.tcp_conv.toLocaleString()}`, status: 'ok'});
      const statusText = pp.done && pp.total
        ? `${pp.done}/${pp.total} PCAPs — ${pp.current || ''}`
        : (count ? `${count} PCAPs analyzed` : (pp.current || ''));
      return { status: statusText, chips: ecChips.length ? ecChips : (count > 10 ? [{segment: `${count} PCAPs processed`, status: 'ok'}] : segs) };
    }
    case 5: {
      const dl = d.db_loading || {};
      if (stage === 'loading_database' && dl.current_table) {
        const pct = dl.total ? Math.round((dl.step / dl.total) * 100) : 60;
        const chips = [{segment: `${dl.current_table}: ${(dl.rows_loaded || 0).toLocaleString()} rows`, status: 'ok'}];
        return { status: `Loading table ${dl.step}/${dl.total}: ${dl.current_table}...`, chips: chips, showBar: true, barPct: pct };
      }
      if (stage === 'loading_database') return { status: 'Initializing database schema...', chips: [], showBar: true, barPct: 10 };
      if (['multi_agent','analyzing','synthesizing','reporting','complete'].includes(stage)) return { status: 'All tables loaded', chips: [] };
      return { status: '', chips: [] };
    }
    case 6: {
      const as2 = d.agent_status || {};
      let agentDetail = '';
      if (as2.worker_id && as2.status === 'running') agentDetail = `Worker ${as2.worker_id}: ${as2.detail || 'investigating...'}`;
      else if (as2.worker_id && as2.status === 'completed') agentDetail = `Worker ${as2.worker_id}: ${as2.detail || 'done'}`;
      return { status: agentDetail, chips: [], showWorkers: true };
    }
    case 7: return { status: stage === 'complete' ? 'Timeline assembled' : '', chips: [] };
    case 8: {
      if (stage === 'synthesizing') return { status: 'Claude Opus 4.6 synthesizing forensic report...', chips: [{segment:'Claude Opus 4.6',status:'active'}] };
      if (stage === 'complete') return { status: 'Report generated', chips: [{segment:'Claude Opus 4.6',status:'ok'}] };
      return { status: '', chips: [] };
    }
  }
  return { status: '', chips: [] };
}

let startedAtISO = null;
let lastStage = '';

function renderLive(d) {
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('app-root').style.display = 'block';

  document.getElementById('case-id').textContent = (d.case_id || '---').toUpperCase();
  document.getElementById('started-at').textContent = 'START: ' + fmt(d.started_at);
  document.getElementById('updated-at').textContent = 'SYNC: ' + fmt(d.updated_at);
  startedAtISO = d.started_at;

  const stage = d.stage || 'waiting';

  // Stage change notification
  if (lastStage && lastStage !== stage) {
    const labels = { preprocessing:'Preprocessing started', loading_database:'Loading database', multi_agent:'Agents investigating', synthesizing:'Synthesizing reports', complete:'Investigation complete' };
    if (labels[stage]) showToast(labels[stage], stage === 'complete' ? 'success' : 'info');
  }
  lastStage = stage;

  const badge = document.getElementById('stage-badge');
  const stageLabels = {
    starting: 'STARTING', preprocessing: 'PREPROCESSING', loading_database: 'LOADING DATABASE',
    multi_agent: 'AGENTS RUNNING', analyzing: 'ANALYZING', synthesizing: 'SYNTHESIZING REPORTS',
    reporting: 'BUILDING TIMELINE', complete: 'COMPLETE', waiting: 'WAITING'
  };
  badge.textContent = stageLabels[stage] || stage;
  badge.className = 'badge badge-' + stage;

  // KPI row
  renderKPIs(d);

  // Phase pipeline
  const phaseStates = getPhaseStates(d);
  const container = document.getElementById('phase-pipeline');
  let html = '';

  PHASES.forEach((phase, idx) => {
    const st = phaseStates[phase.num];
    const dotCls = st === 'done' ? 'done' : st === 'active' ? 'active' : '';
    const connCls = st === 'done' ? 'done' : st === 'active' ? 'active' : '';
    const cardCls = st === 'active' ? 'active' : st === 'done' ? 'done' : '';
    const nameCls = st === 'pending' ? 'dim' : '';
    const detail = getPhaseDetail(phase.num, d);
    const icon = st === 'done' ? '&#10003;' : st === 'active' ? '&#9679;' : phase.num;

    html += `<div class="phase-row">`;
    html += `<div class="phase-line-area">`;
    html += `  <div class="phase-dot ${dotCls}">${icon}</div>`;
    if (idx < PHASES.length - 1) html += `  <div class="phase-connector ${connCls}"></div>`;
    html += `</div>`;
    html += `<div class="phase-card ${cardCls}">`;
    html += `  <div class="phase-title-row">`;
    html += `    <span class="phase-name ${nameCls}">Phase ${phase.num}: ${phase.name}</span>`;
    if (st === 'active') html += `<span style="font-size:10px;color:var(--primary-cyan);animation:pulse-opacity 1.5s infinite;">RUNNING</span>`;
    if (st === 'done') html += `<span style="font-size:10px;color:var(--success-green);">COMPLETE</span>`;
    html += `  </div>`;
    html += `  <div class="phase-desc">${phase.desc}</div>`;

    if (detail.status) {
      const stCls = st === 'done' ? 'done' : '';
      html += `<div class="phase-status-text ${stCls}">${esc(detail.status)}</div>`;
    }

    if (detail.chips && detail.chips.length) {
      html += `<div class="phase-chips">`;
      detail.chips.forEach(c => {
        const cls = c.status === 'ok' ? 'ok' : c.status === 'error' ? 'error' : c.status === 'active' ? 'active' : '';
        html += `<span class="chip ${cls}">${esc(c.segment)}</span>`;
      });
      html += `</div>`;
    }

    if (detail.showBar) {
      const pct = detail.barPct || 60;
      html += `<div class="db-bar-wrap"><div class="db-bar-fill shimmer" style="width:${pct}%"></div></div>`;
    }

    if (detail.showWorkers) html += renderWorkerCards(d);

    html += `</div></div>`;
  });

  container.innerHTML = html;

  // LLM Activity Log
  const llmLog = d.llm_log || [];
  const llmSection = document.getElementById('llm-log-section');
  const llmContainer = document.getElementById('llm-log-container');
  if (llmLog.length) {
    llmSection.style.display = '';
    const _c = { worker_started: '#00e5ff', worker_completed: '#00e676', backend_failed: '#ff3d00', all_backends_failed: '#ff3d00', rate_limit: '#ffb300', tool_call: '#b388ff', worker_dispatched: '#2979ff', key_rotated: '#ff9f43', synthesizer_started: '#ffb300', commonstack_report_completed: '#b388ff' };
    llmContainer.innerHTML = llmLog.map(e => {
      const evt = e.event_type || e.action || '';
      const color = _c[evt] || '#8a9bb2';
      const qid = e.question_id || '';
      let detail = '';
      if (evt === 'worker_started') detail = `<span style="color:#00e5ff">START</span> Worker ${qid} [${esc(e.backend||'')}/${esc(e.model||'')}]` + (e.is_fallback ? ' <span style="color:#ffb300">[FALLBACK]</span>' : '');
      else if (evt === 'worker_completed') detail = `<span style="color:#00e676">DONE</span> Worker ${qid} [${e.iterations||'?'} iters] finding=${e.has_finding?'YES':'NO'}`;
      else if (evt === 'backend_failed') detail = `<span style="color:#ff3d00">FAIL</span> Worker ${qid} [${esc(e.backend||'')}]: ${esc((e.error||'').substring(0,100))}`;
      else if (evt === 'tool_call') { const sql = (e.args||{}).sql||''; detail = `<span style="color:#b388ff">SQL</span> Worker ${qid} [iter ${e.iteration||'?'}] ${esc(sql.substring(0,120))}`; }
      else if (evt === 'rate_limit') detail = `<span style="color:#ffb300">RATE_LIMIT</span> Worker ${qid} backoff=${e.backoff_seconds||'?'}s`;
      else if (evt === 'worker_dispatched') detail = `<span style="color:#2979ff">DISPATCH</span> Worker ${qid}: ${esc(e.title||'')}`;
      else if (evt === 'synthesizer_started') detail = `<span style="color:#ffb300">SYNTH</span> Claude Opus 4.6 report synthesis started`;
      else if (evt === 'synthesizer_completed' || evt === 'commonstack_report_completed') detail = `<span style="color:#00e676">SYNTH</span> ${esc(evt)}: ${esc(JSON.stringify(e).substring(0,100))}`;
      else detail = `${evt}: ${JSON.stringify(e).substring(0, 120)}`;
      return `<div style="border-left:3px solid ${color};padding:2px 8px;margin:2px 0;background:rgba(255,255,255,0.02);">${detail}</div>`;
    }).join('');
    llmContainer.scrollTop = llmContainer.scrollHeight;
  } else {
    llmSection.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════
// KPI ROW
// ═══════════════════════════════════════════════
function renderKPIs(d) {
  const row = document.getElementById('kpi-row');
  const stage = d.stage || 'waiting';
  if (stage === 'waiting' || stage === 'starting') { row.innerHTML = ''; return; }

  const kpis = [];

  // Alerts
  const alertSegs = d.alert_results || [];
  if (alertSegs.length) {
    const total = alertSegs.reduce((s, c) => s + parseInt((c.segment.match(/[\d,]+/) || ['0'])[0].replace(/,/g,''), 10), 0);
    kpis.push({ value: total.toLocaleString(), label: 'Alerts Processed' });
  }

  // Zeek records
  const zeekSegs = d.zeek_results || [];
  if (zeekSegs.length) {
    const total = zeekSegs.reduce((s, c) => s + parseInt((c.segment.match(/[\d,]+/) || ['0'])[0].replace(/,/g,''), 10), 0);
    kpis.push({ value: total.toLocaleString(), label: 'Zeek Records Matched' });
  }

  // PCAPs
  const pcapSegs = d.pcap_index_results || [];
  if (pcapSegs.length) {
    const pcapCount = pcapSegs.find(s => s.segment.match(/\d+\s*PCAPs/));
    if (pcapCount) kpis.push({ value: (pcapCount.segment.match(/(\d+)/)||['?'])[0], label: 'PCAPs Analyzed' });
  }

  // Workers — Claude Opus 4.6 via CommonStack AI
  const llmLog = d.llm_log || [];
  const completedWorkers = llmLog.filter(e => e.event_type === 'worker_completed').length;
  const totalSQLs = llmLog.filter(e => e.event_type === 'tool_call').length;
  if (completedWorkers > 0) {
    kpis.push({ value: `${completedWorkers}/4`, label: 'Workers Done' });
    kpis.push({ value: totalSQLs.toString(), label: 'SQL Queries' });
  }

  // Findings
  const findings = d.findings || {};
  const findingCount = Object.keys(findings).length;
  if (findingCount > 0) {
    const evidenceCount = Object.values(findings).reduce((s, f) => s + (f.evidence_count || 0), 0);
    kpis.push({ value: findingCount.toString(), label: 'Findings' });
    kpis.push({ value: evidenceCount.toString(), label: 'Evidence Items' });
  }

  row.innerHTML = kpis.map(k => `<div class="kpi-card"><div class="kpi-value">${k.value}</div><div class="kpi-label">${k.label}</div></div>`).join('');
}

function _buildWorkerGrid(findings, llmLog, label, labelColor) {
  let html = `<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${labelColor};margin:10px 0 6px;font-family:var(--font-mono);">${label}</div>`;
  html += '<div class="worker-grid">';
  ['A','B','C','D'].forEach(qid => {
    const f = findings[qid];
    const info = WORKER_INFO[qid];
    const dispatched = llmLog.some(e => e.event_type === 'worker_dispatched' && e.question_id === qid);
    const started = llmLog.some(e => e.event_type === 'worker_started' && e.question_id === qid);
    const completed = llmLog.some(e => e.event_type === 'worker_completed' && e.question_id === qid);
    const isRunning = started && !completed;
    const isDone = completed || !!f;
    const isError = f && f.status === 'agent_error';
    const cardCls = isDone ? (isError ? 'error' : 'done') : isRunning ? 'running' : '';

    const toolCalls = llmLog.filter(e => e.event_type === 'tool_call' && e.question_id === qid);
    const maxIter = toolCalls.length ? Math.max(...toolCalls.map(e => e.iteration || 0)) : 0;
    const lastQuery = toolCalls.length ? (toolCalls[toolCalls.length-1].args || {}).sql || '' : '';

    html += `<div class="worker-card ${cardCls}">`;
    html += `<div class="worker-header">`;
    html += `  <span class="worker-letter" style="color:${isDone ? (isError ? 'var(--error-red)' : 'var(--success-green)') : isRunning ? info.color : ''}">${qid}</span>`;
    html += `  <div><div class="worker-title">${info.title}</div><div class="worker-subtitle">MITRE ${info.mitre}</div></div>`;
    if (f) html += `<span class="badge badge-${f.confidence||''}" style="margin-left:auto;font-size:9px;">${f.confidence||''}</span>`;
    html += `</div>`;

    if (isRunning || isDone) {
      const pct = isDone ? 100 : Math.min(100, (maxIter / 30) * 100);
      html += `<div class="worker-progress">`;
      html += `  <div class="worker-iter">Iteration ${maxIter} / 30 &mdash; ${toolCalls.length} SQL queries</div>`;
      html += `  <div class="worker-iter-bar"><div class="worker-iter-fill" style="width:${pct}%"></div></div>`;
      html += `</div>`;
      if (lastQuery && isRunning) html += `<div class="worker-last-query">${esc(lastQuery.substring(0, 120))}</div>`;
    }

    if (f && f.summary) {
      html += `<div class="worker-finding-preview">${esc(f.summary.substring(0, 150))}${f.summary.length > 150 ? '...' : ''}</div>`;
      html += `<div style="margin-top:6px;font-size:10px;font-family:var(--font-mono);color:var(--text-muted);">${f.evidence_count || 0} evidence items</div>`;
    }

    if (!dispatched && !started && !isDone) {
      html += `<div style="font-size:11px;color:var(--text-dim);margin-top:8px;font-style:italic;">Queued...</div>`;
    }

    html += `</div>`;
  });
  html += '</div>';
  return html;
}

function renderWorkerCards(d) {
  const findings = d.findings || {};
  const llmLog = d.llm_log || [];
  return _buildWorkerGrid(findings, llmLog, '▸ Claude Opus 4.6 (CommonStack AI)', 'var(--purple)');
}

setInterval(() => {
  if (!startedAtISO) return;
  const el = document.getElementById('elapsed-timer');
  const start = new Date(startedAtISO + 'Z');
  const now = new Date();
  const diff = Math.floor((now - start) / 1000);
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = diff % 60;
  el.innerHTML = `ELAPSED <span class="num">${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s</span>`;
}, 1000);

const QUESTION_MAP = {
  A: 'What was the initial access vector used by the attacker?',
  B: 'How did the attacker move laterally within the network?',
  C: 'How was data exfiltrated from the network?',
  D: 'How was the ransomware payload delivered to endpoints?',
};

let findingsCache = null;

async function loadFindings() {
  const container = document.getElementById('findings-full-container');
  try {
    const res = await fetch('findings_commonstack.json?_=' + Date.now());
    if (!res.ok) throw new Error('not found');
    findingsCache = await res.json();
  } catch {
    container.innerHTML = `<div class="findings-empty">No findings data available yet. Findings are written after Phase 6 completes.</div>`;
    return;
  }
  renderFindingsFull();
}

function renderFindingsFull() {
  const container = document.getElementById('findings-full-container');
  const data = findingsCache;
  if (!data) { container.innerHTML = `<div class="findings-empty">No findings data available yet.</div>`; return; }

  const questions = data.questions || data;
  let count = 0, html = '';
  ['A','B','C','D'].forEach(letter => {
    const f = questions[letter];
    if (!f) { html += `<div class="finding-full-card"><div class="finding-full-header"><div class="fq-letter">${letter}</div><div class="fq-info"><div class="fq-title">Pending</div><div class="fq-question">${QUESTION_MAP[letter]||''}</div></div></div></div>`; return; }
    count++;
    const evidence = f.evidence || [];
    let evidenceHTML = '';
    if (evidence.length) {
      evidenceHTML = `<div class="fq-section-title">Evidence (${evidence.length} items)</div><table class="evidence-table"><thead><tr><th>Source</th><th>Detail</th><th>Timestamp</th></tr></thead><tbody>${evidence.map(e => `<tr><td>${esc(e.source||e.artifact||e.type||'---')}</td><td>${esc(e.description||e.detail||e.value||'---')}</td><td>${esc(e.ts||e.timestamp||'---')}</td></tr>`).join('')}</tbody></table>`;
    }
    const techniques = f.mitre_techniques || f.mitre || f.techniques || [];
    let mitreHTML = techniques.length ? `<div class="fq-section-title">MITRE ATT&amp;CK</div><div style="margin-top:6px;">${techniques.map(t => `<span class="fq-mitre-chip">${esc(typeof t==='string'?t:`${t.id||''} ${t.name||''}`)}</span>`).join('')}</div>` : '';
    const limitations = f.limitations || [];
    let limHTML = limitations.length ? `<div class="fq-section-title">Limitations</div><ul class="fq-limitations">${limitations.map(l=>`<li>${esc(l)}</li>`).join('')}</ul>` : '';
    const nextSteps = f.next_steps || f.recommendations || [];
    let nsHTML = nextSteps.length ? `<div class="fq-section-title">Next Steps</div><ul class="fq-next-steps">${nextSteps.map(n=>`<li>${esc(n)}</li>`).join('')}</ul>` : '';
    html += `<div class="finding-full-card"><div class="finding-full-header" onclick="this.parentElement.classList.toggle('open')"><div class="fq-letter">${letter}</div><div class="fq-info"><div class="fq-title">${esc(f.title||'Finding '+letter)}</div><div class="fq-question">${QUESTION_MAP[letter]||''}</div></div>${f.confidence?`<span class="badge badge-${f.confidence}" style="margin-left:auto;">${f.confidence}</span>`:''}<div class="fq-chevron">&#9660;</div></div><div class="fq-body"><div class="fq-body-inner"><div class="fq-section-title">Summary</div><div class="fq-summary-text">${esc(f.summary||f.answer||'---')}</div>${mitreHTML}${evidenceHTML}${limHTML}${nsHTML}</div></div></div>`;
  });
  container.innerHTML = html;
  const badge = document.getElementById('findings-count');
  if (count > 0) { badge.style.display = ''; badge.textContent = count; } else badge.style.display = 'none';
}

    th { text-align: left; padding: 8px; background: #f0f4f8; border-bottom: 2px solid #d0d8e0; font-weight: 600; }
    td { padding: 8px; border-bottom: 1px solid #e8ecf0; }
    code { background: #f0f4f8; padding: 1px 6px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    pre { background: #f0f4f8; padding: 12px; border-radius: 6px; font-size: 11px; overflow-x: auto; }
    pre code { background: none; padding: 0; }
    ul, ol { padding-left: 20px; font-size: 13px; }
    li { margin-bottom: 4px; }
    blockquote { border-left: 3px solid #2979ff; padding: 8px 16px; margin: 12px 0; background: #f8fafc; }
    strong { color: #0a1628; }
    hr { border: none; border-top: 1px solid #e0e4e8; margin: 20px 0; }
    .model-badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-bottom: 16px; background: #e8f0fe; color: #1a3a5c; }
    @media print { body { padding: 20px; } @page { margin: 1.5cm; size: A4; } }
  </style></head><body>
  <div class="model-badge">Generated by ${esc(REPORT_MODEL.model)}</div>
  ${renderMarkdown(md)}
  </body></html>`);
  printWin.document.close();
  setTimeout(() => { printWin.print(); }, 500);
  showToast('Print dialog opened — save as PDF', 'success');
}

function renderMarkdown(md) {
  let h = md;
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_,l,c) => `<pre><code>${esc(c.trimEnd())}</code></pre>`);
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  h = h.replace(/^---+$/gm, '<hr>');
  h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');
  h = h.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)+)/gm, (_, header, sep, body) => {
    const ths = header.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(row => `<tr>${row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('')}</tr>`).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });
  h = h.replace(/^(\s*)[-*] (.+)$/gm, '<li>$2</li>');
  h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  h = h.replace(/^(?!<[a-z/])((?!<).+)$/gm, '<p>$1</p>');
  h = h.replace(/<p>\s*<\/p>/g, '');
  return h;
}

// ═══════════════════════════════════════════════
// TAB 4: TIMELINE
// ═══════════════════════════════════════════════
const CAT_COLORS = { initial_access:{color:'#ff3d00',label:'Initial Access'}, lateral_movement:{color:'#ffb300',label:'Lateral Movement'}, exfiltration:{color:'#b388ff',label:'Exfiltration'}, payload_delivery:{color:'#2979ff',label:'Payload Delivery'}, c2:{color:'#ff3d00',label:'C2'}, reconnaissance:{color:'#ffb300',label:'Recon'} };
let timelineCache = null;
let tlFilter = 'all';
async function loadTimeline() {
  const container = document.getElementById('timeline-full-container');
  try {
    const res = await fetch('timeline_commonstack.json?_='+Date.now());
    if (!res.ok) throw new Error('not found');
    timelineCache = await res.json();
  } catch {
    container.innerHTML = `<div class="timeline-empty">No timeline data yet.</div>`; return;
  }
  renderTimelineFull(timelineCache);
}
function renderTimelineFull(data) {
  const container = document.getElementById('timeline-full-container');
  const events = Array.isArray(data) ? data : (data.events || []);

  if (!events.length) { container.innerHTML = `<div class="timeline-empty">Timeline is empty.</div>`; return; }
  const cats = [...new Set(events.map(e=>e.category||'default'))];

  // Filter bar
  let html = '<div class="tl-filter-bar">';
  html += `<button class="tl-filter-btn ${tlFilter==='all'?'active':''}" onclick="setTlFilter('all')">All (${events.length})</button>`;
  cats.forEach(cat => {
    const count = events.filter(e=>(e.category||'default')===cat).length;
    html += `<button class="tl-filter-btn ${tlFilter===cat?'active':''}" onclick="setTlFilter('${cat}')">${(CAT_COLORS[cat]||{label:cat}).label} (${count})</button>`;
  });
  html += '</div>';

  // Legend
  html += '<div class="timeline-legend">';
  cats.forEach(cat => { const i = CAT_COLORS[cat]||{color:'#8a9bb2',label:cat}; html += `<div class="legend-item"><div class="legend-dot" style="background:${i.color}"></div>${i.label}</div>`; });
  html += '</div><div class="timeline-vertical">';

  const filtered = tlFilter === 'all' ? events : events.filter(e=>(e.category||'default')===tlFilter);
  filtered.forEach(e => {
    const cat = e.category||'default'; const cc = CAT_COLORS[cat]?cat:'default';
    html += `<div class="tl-event cat-${cc}"><div class="tl-event-time">${esc((e.timestamp||e.ts||'').substring(0,19))}</div><div class="tl-event-title">${esc(e.title||e.event||'---')}</div><div class="tl-event-desc">${esc(e.summary||e.description||'')}</div>${cat!=='default'?`<span class="tl-event-cat tl-cat-${cc}">${esc((CAT_COLORS[cat]||{label:cat}).label)}</span>`:''}</div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}
function setTlFilter(f) { tlFilter=f; if(timelineCache) renderTimelineFull(timelineCache); }

// ═══════════════════════════════════════════════
// TAB 5: AGENT LOG
// ═══════════════════════════════════════════════
let agentLogCache = null, logFilter = 'all';
async function loadAgentLog() {
  const container = document.getElementById('agentlog-full-container');
  try {
    const res = await fetch('agent_log.json?_='+Date.now());
    if (!res.ok) throw new Error('not found');
    agentLogCache = await res.json();
    renderAgentLog(agentLogCache);
  } catch { if (!agentLogCache) container.innerHTML = `<div class="log-empty">No agent log yet.</div>`; }
}
function renderAgentLog(data) {
  const container = document.getElementById('agentlog-full-container');
  const entries = Array.isArray(data)?data:(data.entries||data.log||[]);
  if (!entries.length) { container.innerHTML = `<div class="log-empty">Agent log is empty.</div>`; return; }
  const types = [...new Set(entries.map(e=>e.type||'default'))];
  let html = '<div class="log-filter-bar">';
  html += `<button class="log-filter-btn ${logFilter==='all'?'active':''}" onclick="setLogFilter('all')">All (${entries.length})</button>`;
  types.forEach(t => {
    const count = entries.filter(e=>(e.type||'default')===t).length;
    html += `<button class="log-filter-btn ${logFilter===t?'active':''}" onclick="setLogFilter('${t}')">${esc(t)} (${count})</button>`;
  });
  html += '</div>';
  const filtered = logFilter === 'all' ? entries : entries.filter(e=>(e.type||'default')===logFilter);
  filtered.forEach(e => {
    const type = e.type||'default';
    const tc = ['tool_call','tool_result','reasoning','decision','error','ingest'].includes(type)?type:'default';
    const ts = e.timestamp||e.ts||''; const msg = e.message||e.action||e.content||'';
    const detail = e.detail||e.result||e.data||''; const ds = typeof detail==='object'?JSON.stringify(detail,null,2):String(detail);
    html += `<div class="log-entry"><span class="log-type-badge log-type-${tc}">${esc(type)}</span><div class="log-body">${ts?`<div class="log-timestamp">${esc(ts.substring(0,19))}</div>`:''}
      <div class="log-message">${esc(msg)}</div>${ds&&ds!=='{}'&&ds!==''?`<div class="log-detail">${esc(ds)}</div>`:''}</div></div>`;
  });
  container.innerHTML = html;
}
function setLogFilter(f) { logFilter=f; if(agentLogCache) renderAgentLog(agentLogCache); }

// ═══════════════════════════════════════════════
// TAB 6: DB EXPLORER
// ═══════════════════════════════════════════════
let dbExplorerLoaded = false;
async function loadDBExplorer() {
  if (dbExplorerLoaded) return;
  const grid = document.getElementById('db-stats-grid');
  const summaryContainer = document.getElementById('ingest-summary-container');

  // Load ingest summary
  try {
    const res = await fetch('ingest_summary.json?_='+Date.now());
    if (res.ok) {
      const data = await res.json();
      dbExplorerLoaded = true;

      // DB table stats
      const tables = data.db_stats || data.table_counts || {};
      const maxRows = Math.max(...Object.values(tables).map(Number), 1);
      grid.innerHTML = Object.entries(tables).sort((a,b) => b[1]-a[1]).map(([name, count]) => {
        const pct = Math.round((count / maxRows) * 100);
        const formatted = Number(count).toLocaleString();
        const isZero = count === 0;
        return `<div class="db-stat-card" ${isZero?'style="opacity:0.5;"':''}>
          <div class="db-stat-name">${esc(name)}</div>
          <div class="db-stat-value" ${isZero?'style="color:var(--error-red);"':''}>${formatted}</div>
          <div class="db-stat-bar"><div class="db-stat-bar-fill" style="width:${pct}%"></div></div>
        </div>`;
      }).join('');

      // Ingest summary detail
      let summaryHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;">';
      if (data.alerts) {
        summaryHtml += `<div><strong style="color:var(--primary-cyan);">Phase 1: Alerts</strong><br>`;
        summaryHtml += `Categories: ${data.alerts.categories || '?'}<br>`;
        summaryHtml += `Total alerts: ${(data.alerts.total||0).toLocaleString()}<br>`;
        summaryHtml += `IOC IPs: ${(data.alerts.ioc_ips||0).toLocaleString()}<br>`;
        summaryHtml += `Community IDs: ${(data.alerts.community_ids||0).toLocaleString()}</div>`;
      }
      if (data.zeek) {
        summaryHtml += `<div><strong style="color:var(--primary-cyan);">Phase 2: Zeek</strong><br>`;
        summaryHtml += `Scanned: ${(data.zeek.scanned||0).toLocaleString()}<br>`;
        summaryHtml += `Matched: ${(data.zeek.matched||0).toLocaleString()}<br>`;
        const protocols = data.zeek.protocols || {};
        Object.entries(protocols).forEach(([p,c]) => {
          const capped = c >= 500000 ? ' <span style="color:var(--warning-amber);">CAPPED</span>' : '';
          summaryHtml += `${p}: ${Number(c).toLocaleString()}${capped}<br>`;
        });
        summaryHtml += `</div>`;
      }
      if (data.pcap) {
        summaryHtml += `<div><strong style="color:var(--primary-cyan);">Phase 3-4: PCAP</strong><br>`;
        summaryHtml += `Total PCAPs: ${data.pcap.total || '?'}<br>`;
        summaryHtml += `Analyzed: ${data.pcap.analyzed || '?'}<br>`;
        const ec = data.pcap.extraction_counts || {};
        Object.entries(ec).forEach(([k,v]) => summaryHtml += `${k}: ${Number(v).toLocaleString()}<br>`);
        summaryHtml += `</div>`;
      }
      summaryHtml += '</div>';
      summaryContainer.innerHTML = summaryHtml;
    } else {
      grid.innerHTML = '<div style="color:var(--text-dim);padding:40px;text-align:center;">No ingest summary available yet.</div>';
    }
  } catch {
    grid.innerHTML = '<div style="color:var(--text-dim);padding:40px;text-align:center;">Failed to load DB stats.</div>';
  }
}

function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }
function fmt(iso) { if(!iso) return '---'; try { const d=new Date(iso+'Z'); return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}); } catch { return iso; } }

async function fetchProgress() {
  try { const res = await fetch('progress.json?_='+Date.now()); if (res.ok) renderLive(await res.json()); } catch(_) {}
}
fetchProgress();
setInterval(fetchProgress, 2000);
